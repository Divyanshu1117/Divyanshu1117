name: Generate Neon Snake

on:
  schedule:
    - cron: "0 0 * * *" # Runs every day
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Generate Snake (Neon Dark)
        uses: Platane/snk@v3
        with:
          github_user_name: Divyanshu1117
          outputs: dist/neon-snake.svg
          color_snake: "#ff00ff,#00ffff,#ff1493"
          color_dots: "#0d1117,#161b22,#30363d,#484f58,#6e7681"
          svg_width: 1200

      - name: Add top margin (fix overflow issue)
        run: |
          sed -i 's/viewBox="0 0 1000 200"/viewBox="0 0 1000 250"/' dist/neon-snake.svg

      - name: Publish to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
          keep_history: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
