name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *" # daily at 00:00 UTC
  workflow_dispatch:

permissions:
  contents: write  # allow pushing to branches

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Generate Snake (Dark + Neon)
        uses: Platane/snk@v3
        with:
          github_user_name: Divyanshu1117
          # we output ONE file; easier to track
          outputs: dist/neon-snake.svg
          color_snake: "#ff00ff,#00ffff,#ff1493"
          color_dots: "#0d1117,#161b22,#30363d,#484f58,#6e7681"
          svg_width: 1200

      - name: Publish to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
          keep_history: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
