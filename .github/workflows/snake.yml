name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *" # once every day
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Generate Snake as GIF
        uses: Platane/snk@v3
        with:
          github_user_name: Divyanshu1117
          outputs: |
            dist/github-contribution-grid-snake.gif
            dist/github-contribution-grid-snake.svg

      - name: Push Snake to output branch
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git fetch
          git checkout --orphan output
          git reset --hard
          cp dist/github-contribution-grid-snake.gif github-contribution-grid-snake.gif
          cp dist/github-contribution-grid-snake.svg github-contribution-grid-snake.svg
          git add github-contribution-grid-snake.gif github-contribution-grid-snake.svg
          git commit -m "Update snake animation"
          git push --force origin output
