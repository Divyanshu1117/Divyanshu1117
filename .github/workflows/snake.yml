name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *" # runs daily
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: Divyanshu1117
          outputs: dist/github-contribution-grid-snake.svg
          color_snake: "#9417FF" # purple snake
          color_dots: "#FFFFFF,#C6E48B,#7BC96F,#239A3B,#196127" # white background theme
          svg_width: 900
          padding: 40 # this adds top + bottom gap so snake never goes outside

      - name: Push to output branch
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git fetch
          git checkout --orphan output
          git reset --hard
          cp dist/github-contribution-grid-snake.svg github-contribution-grid-snake.svg
          git add github-contribution-grid-snake.svg
          git commit -m "Update snake animation"
          git push --force origin output
