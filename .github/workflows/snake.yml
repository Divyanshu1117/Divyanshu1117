name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *" # Runs daily at 00:00 UTC
  workflow_dispatch:

permissions:
  contents: write  # Required for pushing to branches

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: Divyanshu1117
          outputs: dist/github-contribution-grid-snake.svg
          color_snake: "#ff00ff,#00ffff,#ff1493"
          color_dots: "#0d1117,#161b22,#30363d,#484f58,#6e7681"
          svg_width: 1200

      - name: Deploy to output branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: output    # THIS creates/updates output branch
          folder: dist      # Upload dist folder contents
