name: DEBUG Snake Build

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Generate snake
        uses: Platane/snk@v3
        with:
          github_user_name: Divyanshu1117
          outputs: |
            dist/snake-light.svg
            dist/snake-dark.svg?palette=github-dark

      - name: List dist contents
        run: |
          echo "Dist contents:"
          ls -R dist || echo "dist folder missing!"

      - name: Publish to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
          keep_history: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
