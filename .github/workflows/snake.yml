name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *" # daily run
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: Divyanshu1117
          outputs: dist/github-contribution-grid-snake.svg
          color_snake: "#9417FF" # Snake ka color (Purple)
          color_dots: "#0d1117,#216e39,#30a14e,#40c463,#9be9a8" # Background + contribution shades

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
